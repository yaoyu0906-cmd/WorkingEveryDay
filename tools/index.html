<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tools — Personal</title>
<style>
body{margin:0;font-family:Arial;background:url("../../indexbg.jpg") no-repeat center/cover;min-height:100vh;color:white;}
.navbar{display:flex;justify-content:space-between;align-items:center;padding:15px 30px;background:rgba(0,0,0,0.6);backdrop-filter:blur(10px);}
.logo{font-size:22px;font-weight:bold;}
.nav-left{display:flex;align-items:center;gap:12px;}
.badge{font-size:11px;color:#aaa;background:rgba(255,255,255,0.1);padding:3px 10px;border-radius:20px;letter-spacing:1px;}
.nav-right{display:flex;align-items:center;gap:12px;}
.btn{width:6.5em;height:2.3em;margin:0.3em;background:black;color:white;border:none;border-radius:0.625em;font-size:16px;font-weight:bold;cursor:pointer;position:relative;z-index:1;overflow:hidden;}
.btn-sm{width:5em;height:2.3em;background:black;color:white;border:none;border-radius:0.625em;font-size:14px;font-weight:bold;cursor:pointer;position:relative;z-index:1;overflow:hidden;}
.btn-full{width:100%;height:2.3em;margin:0;background:black;color:white;border:none;border-radius:0.625em;font-size:15px;font-weight:bold;cursor:pointer;position:relative;z-index:1;overflow:hidden;}
button:hover{color:black;}
button:after{content:"";background:white;position:absolute;z-index:-1;left:-20%;right:-20%;top:0;bottom:0;transform:skewX(-45deg) scale(0,1);transition:all 0.5s;}
button:hover:after{transform:skewX(-45deg) scale(1,1);}
.container{padding:28px 24px 36px;max-width:720px;margin:0 auto;}
.section-label{color:rgba(255,255,255,0.9);font-size:11px;text-transform:uppercase;letter-spacing:3px;font-weight:bold;margin:0 0 14px 2px;text-shadow:0 1px 6px rgba(0,0,0,0.9);background:rgba(0,0,0,0.4);display:inline-block;padding:3px 10px;border-radius:5px;}
.section{margin-bottom:24px;}
.card{background:rgba(0,0,0,0.55);border:1px solid rgba(255,255,255,0.12);backdrop-filter:blur(12px);border-radius:12px;}
.card-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:12px;}
.card-block{padding:18px 18px 16px;display:flex;flex-direction:column;}
.card-icon{font-size:22px;margin-bottom:8px;}
.card-title{color:white;font-size:15px;font-weight:bold;margin-bottom:5px;}
.card-desc{color:rgba(255,255,255,0.55);font-size:13px;line-height:1.4;margin-bottom:14px;flex:1;}
</style>
</head>
<body>
<div class="navbar">
  <div class="nav-left">
    <div class="logo">WorkingEveryday</div>
    <span class="badge">🏠 Personal</span>
  </div>
  <div class="nav-right">
    <button class="btn-sm" onclick="location.href='/personal'">← Back</button>
    <button class="btn" onclick="location.href='/profile'">Profile</button>
  </div>
</div>
<div class="container">
  <div class="section">
    <p class="section-label">Tools</p>
    <div class="card-grid">
      <div class="card card-block">
        <div class="card-icon">📅</div>
        <div class="card-title">Calendar</div>
        <div class="card-desc">Your personal schedule & events</div>
        <button class="btn-full" onclick="location.href='/personal/tools/calendar'">Open</button>
      </div>
      <div class="card card-block">
        <div class="card-icon">📝</div>
        <div class="card-title">Notes</div>
        <div class="card-desc">Quick notes & personal docs</div>
        <button class="btn-full" onclick="location.href='/personal/tools/notes'">Open</button>
      </div>
    </div>
  </div>
</div>
</body>
</html>
