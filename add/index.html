<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Add Workspace — WorkingEveryday</title>
<style>
body{margin:0;font-family:Arial;background:url("../indexbg.jpg") no-repeat center/cover;min-height:100vh;color:white;display:flex;flex-direction:column;}
.navbar{display:flex;justify-content:space-between;align-items:center;padding:15px 30px;background:rgba(0,0,0,0.6);backdrop-filter:blur(10px);}
.logo{font-size:22px;font-weight:bold;}
.btn-sm{width:5em;height:2.3em;background:black;color:white;border:none;border-radius:0.625em;font-size:14px;font-weight:bold;cursor:pointer;position:relative;z-index:1;overflow:hidden;}
.btn-full{width:100%;height:2.5em;background:black;color:white;border:none;border-radius:0.625em;font-size:15px;font-weight:bold;cursor:pointer;position:relative;z-index:1;overflow:hidden;}
button:hover{color:black;}
button:after{content:"";background:white;position:absolute;z-index:-1;left:-20%;right:-20%;top:0;bottom:0;transform:skewX(-45deg) scale(0,1);transition:all 0.5s;}
button:hover:after{transform:skewX(-45deg) scale(1,1);}
.center{flex:1;display:flex;justify-content:center;align-items:center;}
.card{background:rgba(0,0,0,0.6);border:1px solid rgba(255,255,255,0.12);backdrop-filter:blur(14px);border-radius:14px;padding:28px 26px;width:300px;display:flex;flex-direction:column;gap:18px;}
.tab-row{display:flex;gap:8px;}
.tab{flex:1;height:2.3em;background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.5);border:1px solid rgba(255,255,255,0.12);border-radius:0.625em;font-size:14px;font-weight:bold;cursor:pointer;}
.tab.active{background:black;color:white;}
.tab:after{display:none;}
.tab:hover{color:black;}
.section-title{font-size:17px;font-weight:bold;margin:0;}
.section-sub{font-size:13px;color:rgba(255,255,255,0.5);margin:4px 0 0;}
.field{display:flex;flex-direction:column;gap:6px;}
.field label{font-size:11px;color:rgba(255,255,255,0.5);text-transform:uppercase;letter-spacing:1px;}
.field input{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:8px;padding:10px 12px;color:white;font-size:14px;outline:none;}
.field input::placeholder{color:rgba(255,255,255,0.3);}
.field input:focus{border-color:rgba(255,255,255,0.4);}
</style>
</head>
<body>
<div class="navbar">
  <div class="logo">WorkingEveryday</div>
  <button class="btn-sm" onclick="location.href='/main'">← Back</button>
</div>
<div class="center">
  <div class="card">
    <div class="tab-row">
      <button class="tab active" id="tab-join" onclick="switchTab('join')">Join</button>
      <button class="tab" id="tab-create" onclick="switchTab('create')">Create</button>
    </div>

    <div id="pane-join">
      <div class="section-title">Join a Workspace</div>
      <div class="section-sub" style="margin-bottom:14px;">Enter an invite code from your company admin</div>
      <div class="field" style="margin-bottom:14px;">
        <label>Invite Code</label>
        <input type="text" placeholder="e.g. HW-4829-XZ">
      </div>
      <button class="btn-full">Join Workspace</button>
    </div>

    <div id="pane-create" style="display:none;">
      <div class="section-title">Create a Workspace</div>
      <div class="section-sub" style="margin-bottom:14px;">Set up a company workspace — your URL will be /[name]</div>
      <div class="field" style="margin-bottom:14px;">
        <label>Company Name</label>
        <input type="text" placeholder="e.g. helloworld">
      </div>
      <button class="btn-full">Create Workspace</button>
    </div>
  </div>
</div>
<script>
function switchTab(t){
  document.getElementById('pane-join').style.display=t==='join'?'block':'none';
  document.getElementById('pane-create').style.display=t==='create'?'block':'none';
  document.getElementById('tab-join').classList.toggle('active',t==='join');
  document.getElementById('tab-create').classList.toggle('active',t==='create');
}
</script>
</body>
</html>
